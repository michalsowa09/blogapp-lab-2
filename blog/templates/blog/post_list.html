{% extends "blog/base.html" %}
{% block content %}
    {% for post in posts %}
        <div class="card mb-3 shadow-sm">
            <div class="card-body">
                <h2><a href="{% url 'post_detail' post.pk %}" class="text-dark text-decoration-none">{{ post.title }}</a></h2>
                <p class="text-muted small">Przez {{ post.author }} | {{ post.published_at }}</p>
                <p>{{ post.content|truncatewords:30 }}</p>
            </div>
        </div>
    {% endfor %}
{% endblock %}
